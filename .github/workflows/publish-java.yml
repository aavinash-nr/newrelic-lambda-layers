name: Publish Java Layers

on:
  push:
    tags:
      - v**_java

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag-match:       ${{ steps.preflight.outputs.tag-match }}
      skipped-regions: ${{ steps.preflight.outputs.skipped-regions }}
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # pin@v4
      - name: Run pre-flight checks
        id: preflight
        uses: ./.github/actions/preflight
        with:
          tag-pattern:           '^refs/tags/v[0-9]+(\.[0-9]+)*_java$'
          artifact-key:          java
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucket-name-prefix:    ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}

  publish-java:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    strategy:
      fail-fast: false
      matrix:
        java-version: [java8al2, java11, java17, java21]
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # pin@v4
      - name: Set up Java version
        run: |
          declare -A map_java_version
          map_java_version=(
            ["java8al2"]="8"
            ["java11"]="11"
            ["java17"]="17"
            ["java21"]="21"
          )
          java_numeric_version=${map_java_version[${{ matrix.java-version }}]}
          echo "JAVA_NUMERIC_VERSION=$java_numeric_version" >> $GITHUB_ENV
      - name: Use Java ${{ env.JAVA_NUMERIC_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: ${{ env.JAVA_NUMERIC_VERSION }}
      - name: Prepare results directory
        run: mkdir -p /tmp/layer-results
      - name: Publish ${{ matrix.java-version }} layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: make publish-${{ matrix.java-version }}-ci
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Publish ECR image for ${{ matrix.java-version }}
        id: ecr
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REPO_NAME:         ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
        run: |
          cd java
          ./publish-layers.sh build-publish-${{ matrix.java-version }}-ecr-image
      - name: Write job result to artifact
        if: always()
        env:
          JAVA_VERSION:    ${{ matrix.java-version }}
          JOB_STATUS:      ${{ job.status }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
          ECR_OUTCOME:     ${{ steps.ecr.outcome }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$ECR_OUTCOME" == "failure" ]]; then
            REASON="ECR image push failed"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Build or setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Java ${JAVA_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version="
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/java-${JAVA_VERSION}.txt"
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-java-${{ matrix.java-version }}
          path: /tmp/layer-results/java-${{ matrix.java-version }}.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-java]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-java-*
          language-name:     Java
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

name: Publish Python Layers

on:
  push:
    tags:
      - v**_python

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag-match:       ${{ steps.preflight.outputs.tag-match }}
      skipped-regions: ${{ steps.preflight.outputs.skipped-regions }}
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-flight checks
        id: preflight
        uses: ./.github/actions/preflight
        with:
          tag-pattern:           '^refs/tags/v[0-9]+(\.[0-9]+)*_python$'
          artifact-key:          python
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucket-name-prefix:    ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}

  publish-python:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/python-layer-setup
      - name: Publish Python ${{ matrix.python-version }} layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: |
          cd python
          ./publish-layers.sh python${{ matrix.python-version }}
      - name: Validate published layer
        id: validate
        if: steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PYTHON_VERSION:        ${{ matrix.python-version }}
        run: |
          LAYER_SUFFIX=$(echo "$PYTHON_VERSION" | tr -d '.')
          LAYER_NAME="NewRelicPython${LAYER_SUFFIX}"
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          LAYER_VERSION="${LAYER_VERSION//[[:space:]]/}"
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: $LAYER_NAME not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: $LAYER_NAME v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Write job result to artifact
        if: always()
        env:
          PYTHON_VERSION:    ${{ matrix.python-version }}
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Python ${PYTHON_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/python-${PYTHON_VERSION}.txt"
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-python-${{ matrix.python-version }}
          path: /tmp/layer-results/python-${{ matrix.python-version }}.txt
          retention-days: 1

  publish-python-universal:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/python-layer-setup
      - name: Publish universal Python layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: |
          cd python
          ./publish-layers.sh python
      - name: Validate published layer
        id: validate
        if: steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name NewRelicPython \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          LAYER_VERSION="${LAYER_VERSION//[[:space:]]/}"
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: NewRelicPython not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: NewRelicPython v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Write job result to artifact
        if: always()
        env:
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Python Universal"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > /tmp/layer-results/python-universal.txt
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-python-universal
          path: /tmp/layer-results/python-universal.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-python, publish-python-universal]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-python-*
          language-name:     Python
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

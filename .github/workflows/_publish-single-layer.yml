name: _Publish Single Layer (reusable)

on:
  workflow_call:
    inputs:
      tag-pattern:
        description: 'Bash regex for the tag check (e.g. ^refs/tags/v[0-9]+(\\.[0-9]+)*_dotnet)'
        required: true
        type: string
      install-awscli:
        description: 'Whether to pip install awscli before publishing'
        required: false
        type: boolean
        default: false
      publish-dir:
        description: 'Directory containing the publish script (e.g. dotnet, extension)'
        required: true
        type: string
      publish-script:
        description: 'Publish script to run inside publish-dir (e.g. ./publish-layers.sh)'
        required: true
        type: string
      layer-name-aws:
        description: 'AWS Lambda layer name used for post-publish validation (e.g. NewRelicDotnet)'
        required: true
        type: string
      artifact-key:
        description: 'Short key used for the result artifact name and file (e.g. dotnet, extension)'
        required: true
        type: string
      artifact-label:
        description: 'Human-readable label written into the result artifact (e.g. .NET, Extension)'
        required: true
        type: string
      language-name:
        description: 'Language name shown in the Slack notification header (e.g. .NET, Extension)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      LAYER_RELEASE_SLACK_WEBHOOK:
        required: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag-match:       ${{ steps.preflight.outputs.tag-match }}
      skipped-regions: ${{ steps.preflight.outputs.skipped-regions }}
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-flight checks
        id: preflight
        uses: ./.github/actions/preflight
        with:
          tag-pattern:           ${{ inputs.tag-pattern }}
          artifact-key:          ${{ inputs.artifact-key }}
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucket-name-prefix:    ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}

  publish:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install publish dependencies
        if: inputs.install-awscli
        run: pip install -U awscli
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Publish layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          ECR_REPO_NAME:          ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: |
          cd ${{ inputs.publish-dir }}
          ${{ inputs.publish-script }}
      - name: Write job result to artifact
        if: always()
        env:
          ARTIFACT_LABEL:  ${{ inputs.artifact-label }}
          ARTIFACT_KEY:    ${{ inputs.artifact-key }}
          JOB_STATUS:      ${{ job.status }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Build or setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=${ARTIFACT_LABEL}"
            echo "status=${JOB_STATUS}"
            echo "version="
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/${ARTIFACT_KEY}.txt"
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-${{ inputs.artifact-key }}
          path: /tmp/layer-results/${{ inputs.artifact-key }}.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-${{ inputs.artifact-key }}*
          language-name:     ${{ inputs.language-name }}
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

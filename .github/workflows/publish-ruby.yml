name: Publish Ruby Layers

on:
  push:
    tags:
      - v**_ruby

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag-match:       ${{ steps.preflight.outputs.tag-match }}
      skipped-regions: ${{ steps.preflight.outputs.skipped-regions }}
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-flight checks
        id: preflight
        uses: ./.github/actions/preflight
        with:
          tag-pattern:           '^refs/tags/v[0-9]+(\.[0-9]+)*_ruby$'
          artifact-key:          ruby
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucket-name-prefix:    ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}

  publish-ruby:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    strategy:
      fail-fast: false
      matrix:
        ruby-version: [3.2, 3.3, 3.4]
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1.226.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - name: Clean the workspace
        run: ./bin/clean
        working-directory: ruby
      - name: Install Ruby Dependencies
        run: bundle
        working-directory: ruby
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Prepare results directory
        run: mkdir -p /tmp/layer-results
      - name: Build and Publish layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: ./publish-layers.sh ruby${{ matrix.ruby-version }}
        working-directory: ruby
      - name: Write job result to artifact
        if: always()
        env:
          RUBY_VERSION:    ${{ matrix.ruby-version }}
          JOB_STATUS:      ${{ job.status }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Build or setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Ruby ${RUBY_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version="
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/ruby-${RUBY_VERSION}.txt"
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-ruby-${{ matrix.ruby-version }}
          path: /tmp/layer-results/ruby-${{ matrix.ruby-version }}.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-ruby]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-ruby-*
          language-name:     Ruby
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

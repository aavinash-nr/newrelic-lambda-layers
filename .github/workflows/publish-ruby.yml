name: Publish Ruby Layers

on:
  push:
    tags:
      - v**_ruby

jobs:
  publish-ruby:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: [3.2, 3.3, 3.4]
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Use Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1.226.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - name: Check Tag
        id: check-tag
        env:
          GIT_REF: ${{ github.event.ref }}
        run: |
          if [[ "$GIT_REF" =~ ^refs/tags/v[0-9]+(\.[0-9]+)*_ruby$ ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
          fi
      - name: Clean the workspace
        if: steps.check-tag.outputs.match == 'true'
        run: ./bin/clean
        working-directory: ruby
      - name: Install Ruby Dependencies
        if: steps.check-tag.outputs.match == 'true'
        run: bundle
        working-directory: ruby
      - name: Pre-flight check (credentials + S3 buckets)
        if: steps.check-tag.outputs.match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: |
          source libBuild.sh
          preflight_check
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64, amd64
      - name: Build and Publish layer
        id: publish
        if: steps.check-tag.outputs.match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: ./publish-layers.sh ruby${{ matrix.ruby-version }}
        working-directory: ruby
      - name: Validate published layer
        id: validate
        if: steps.check-tag.outputs.match == 'true' && steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RUBY_VERSION:          ${{ matrix.ruby-version }}
        run: |
          # Map 3.2 → Ruby32, 3.3 → Ruby33 etc.
          LAYER_SUFFIX=$(echo "$RUBY_VERSION" | tr -d '.')
          LAYER_NAME="NewRelicRuby${LAYER_SUFFIX}"
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: $LAYER_NAME not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: $LAYER_NAME v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Write job result to artifact
        if: always() && steps.check-tag.outputs.match == 'true'
        env:
          RUBY_VERSION:      ${{ matrix.ruby-version }}
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Build or setup step failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Ruby ${RUBY_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/ruby-${RUBY_VERSION}.txt"
      - name: Upload result artifact
        if: always() && steps.check-tag.outputs.match == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-ruby-${{ matrix.ruby-version }}
          path: /tmp/layer-results/ruby-${{ matrix.ruby-version }}.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-ruby]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-ruby-*
          language-name:     Ruby
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

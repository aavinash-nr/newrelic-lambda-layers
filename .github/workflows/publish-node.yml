name: Publish Node Layers

on:
  push:
    tags:
      - v**_nodejs

jobs:
  publish-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/node-layer-setup
        with:
          node-version: ${{ matrix.node-version }}
      - name: Pre-flight check (credentials + S3 buckets)
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: |
          source libBuild.sh
          preflight_check
      - name: Publish layer
        id: publish
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: make publish-nodejs${{ matrix.node-version }}-ci
      - name: Publish ECR image
        id: ecr
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
        run: |
          cd nodejs
          ./publish-layers.sh build-publish-${{ matrix.node-version }}-ecr-image
      - name: Validate published layer
        id: validate
        if: steps.setup.outputs.tag-match == 'true' && steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NODE_VERSION: ${{ matrix.node-version }}
        run: |
          LAYER_NAME="NewRelicNodeJS${NODE_VERSION}X"
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: $LAYER_NAME not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: $LAYER_NAME v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Upload Unit Test Coverage
        if: steps.setup.outputs.tag-match == 'true'
        uses: codecov/codecov-action@v5.3.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/coverage/unit/lcov.info
          fail_ci_if_error: true
          flags: unit-tests
      - name: Write job result to artifact
        id: write-result
        if: always() && steps.setup.outputs.tag-match == 'true'
        env:
          NODE_VERSION: ${{ matrix.node-version }}
          JOB_STATUS:   ${{ job.status }}
          PUBLISH_OUTCOME:  ${{ steps.publish.outcome }}
          ECR_OUTCOME:      ${{ steps.ecr.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$ECR_OUTCOME" == "failure" ]]; then
            REASON="ECR image push failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup or unit tests failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Node.js ${NODE_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/node-${NODE_VERSION}.txt"
      - name: Upload result artifact
        if: always() && steps.setup.outputs.tag-match == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-node-${{ matrix.node-version }}
          path: /tmp/layer-results/node-${{ matrix.node-version }}.txt
          retention-days: 1

  publish-node-universal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/node-layer-setup
        with:
          node-version: 22
      - name: Pre-flight check (credentials + S3 buckets)
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: |
          source libBuild.sh
          preflight_check
      - name: Publish universal layer
        id: publish
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX: ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
        run: make publish-nodejs-universal-ci
      - name: Publish universal ECR image
        id: ecr
        if: steps.setup.outputs.tag-match == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REPO_NAME: ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
        run: |
          cd nodejs
          ./publish-layers.sh build-publish-universal-ecr-image
      - name: Validate published layer
        id: validate
        if: steps.setup.outputs.tag-match == 'true' && steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name NewRelicNodeJS \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: NewRelicNodeJS not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: NewRelicNodeJS v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Upload Unit Test Coverage
        if: steps.setup.outputs.tag-match == 'true'
        uses: codecov/codecov-action@v5.3.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/coverage/unit/lcov.info
          fail_ci_if_error: true
          flags: unit-tests
      - name: Write job result to artifact
        if: always() && steps.setup.outputs.tag-match == 'true'
        env:
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          ECR_OUTCOME:       ${{ steps.ecr.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$ECR_OUTCOME" == "failure" ]]; then
            REASON="ECR image push failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup or tests failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Node.js Universal"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > /tmp/layer-results/node-universal.txt
      - name: Upload result artifact
        if: always() && steps.setup.outputs.tag-match == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-node-universal
          path: /tmp/layer-results/node-universal.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-node, publish-node-universal]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: layer-result-node-*
          merge-multiple: true
          path: /tmp/layer-results
      - name: Build and send aggregated Slack notification
        env:
          SLACK_WEBHOOK: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}
          GH_REF_NAME:   ${{ github.ref_name }}
          GH_ACTOR:      ${{ github.actor }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          OVERALL="success"
          RESULTS_TEXT=""
          FAILED_COUNT=0
          TOTAL_COUNT=0
          ALL_SKIPPED_REGIONS=()

          for f in $(ls /tmp/layer-results/*.txt 2>/dev/null | sort); do
            [[ -f "$f" ]] || continue
            TOTAL_COUNT=$((TOTAL_COUNT + 1))

            label=$(grep '^label=' "$f" | cut -d= -f2-)
            status=$(grep '^status=' "$f" | cut -d= -f2-)
            version=$(grep '^version=' "$f" | cut -d= -f2-)
            reason=$(grep '^reason=' "$f" | cut -d= -f2-)
            skipped=$(grep '^skipped-regions=' "$f" | cut -d= -f2-)

            if [[ "$status" == "success" ]]; then
              [[ -n "$version" ]] \
                && RESULTS_TEXT+="✅ ${label} (v${version})\n" \
                || RESULTS_TEXT+="✅ ${label}\n"
            else
              OVERALL="failure"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              [[ -n "$reason" ]] \
                && RESULTS_TEXT+="❌ ${label} — ${reason}\n" \
                || RESULTS_TEXT+="❌ ${label} — ${status}\n"
            fi

            # Collect skipped regions across all versions (deduplicate)
            if [[ -n "$skipped" ]]; then
              IFS=',' read -ra regions <<< "$skipped"
              for r in "${regions[@]}"; do
                [[ -n "$r" ]] && ALL_SKIPPED_REGIONS+=("$r")
              done
            fi
          done

          # Deduplicate skipped regions
          UNIQUE_SKIPPED=$(printf '%s\n' "${ALL_SKIPPED_REGIONS[@]}" | sort -u | tr '\n' ',')

          if [[ "$OVERALL" == "success" ]]; then
            HEADER="✅ Node.js Layer Release Succeeded"
          else
            HEADER="❌ Node.js Layer Release Failed (${FAILED_COUNT}/${TOTAL_COUNT} versions failed)"
          fi

          # Region summary block
          if [[ -n "$UNIQUE_SKIPPED" ]]; then
            SKIPPED_DISPLAY=$(echo "$UNIQUE_SKIPPED" | tr ',' '\n' | sed 's/^/  • /' | tr '\n' '\n')
            REGION_TEXT="⚠️ *Regions skipped (AWS infra errors):*\n${SKIPPED_DISPLAY}\nThese may need a manual re-publish."
          elif [[ "$OVERALL" == "success" ]]; then
            REGION_TEXT="✅ All regions published successfully"
          else
            REGION_TEXT=""
          fi

          EXTRA_BLOCKS="[]"
          if [[ -n "$REGION_TEXT" ]]; then
            EXTRA_BLOCKS=$(jq -n --arg text "$REGION_TEXT" \
              '[{ type: "section", text: { type: "mrkdwn", text: $text } }]')
          fi

          if [[ "$FAILED_COUNT" -eq "$TOTAL_COUNT" && "$TOTAL_COUNT" -gt 0 ]]; then
            ALL_FAILED_BLOCK=$(jq -n --arg url "$RUN_URL" \
              '[{ type: "section", text: { type: "mrkdwn", text: ("⚠️ All versions failed. <" + $url + "|View full logs here>.") } }]')
            EXTRA_BLOCKS=$(jq -n --argjson a "$EXTRA_BLOCKS" --argjson b "$ALL_FAILED_BLOCK" '$a + $b')
          fi

          PAYLOAD=$(jq -n \
            --arg header "$HEADER" \
            --arg ref_name "$GH_REF_NAME" \
            --arg actor "$GH_ACTOR" \
            --arg results "$(echo -e "$RESULTS_TEXT")" \
            --arg run_url "$RUN_URL" \
            --argjson extra_blocks "$EXTRA_BLOCKS" \
            '{
              blocks: (
                [
                  { type: "header", text: { type: "plain_text", text: $header, emoji: true } },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*Tag:*\n`" + $ref_name + "`") },
                      { type: "mrkdwn", text: ("*Triggered by:*\n" + $actor) }
                    ]
                  },
                  { type: "section", text: { type: "mrkdwn", text: ("*Layer Results:*\n" + $results) } }
                ] + $extra_blocks + [
                  {
                    type: "actions",
                    elements: [{ type: "button", text: { type: "plain_text", text: "View Workflow Run" }, url: $run_url }]
                  }
                ]
              )
            }')

          curl -sf -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

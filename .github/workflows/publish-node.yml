name: Publish Node Layers

on:
  push:
    tags:
      - v**_nodejs

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag-match:       ${{ steps.preflight.outputs.tag-match }}
      skipped-regions: ${{ steps.preflight.outputs.skipped-regions }}
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-flight checks
        id: preflight
        uses: ./.github/actions/preflight
        with:
          tag-pattern:           '^refs/tags/v[0-9]+(\.[0-9]+)*_nodejs$'
          artifact-key:          node
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          bucket-name-prefix:    ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}

  publish-node:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/node-layer-setup
        with:
          node-version: ${{ matrix.node-version }}
      - name: Publish layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:        ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:    ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:       ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS:   ${{ needs.preflight.outputs.skipped-regions }}
        run: make publish-nodejs${{ matrix.node-version }}-ci
      - name: Publish ECR image
        id: ecr
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REPO_NAME:         ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
        run: |
          cd nodejs
          ./publish-layers.sh build-publish-${{ matrix.node-version }}-ecr-image
      - name: Validate published layer
        id: validate
        if: steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          NODE_VERSION:          ${{ matrix.node-version }}
        run: |
          LAYER_NAME="NewRelicNodeJS${NODE_VERSION}X"
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          LAYER_VERSION="${LAYER_VERSION//[[:space:]]/}"
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: $LAYER_NAME not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: $LAYER_NAME v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Upload Unit Test Coverage
        uses: codecov/codecov-action@v5.3.1
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/coverage/unit/lcov.info
          fail_ci_if_error: true
          flags: unit-tests
      - name: Write job result to artifact
        id: write-result
        if: always()
        env:
          NODE_VERSION:      ${{ matrix.node-version }}
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          ECR_OUTCOME:       ${{ steps.ecr.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$ECR_OUTCOME" == "failure" ]]; then
            REASON="ECR image push failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup or unit tests failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Node.js ${NODE_VERSION}"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > "/tmp/layer-results/node-${NODE_VERSION}.txt"
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-node-${{ matrix.node-version }}
          path: /tmp/layer-results/node-${{ matrix.node-version }}.txt
          retention-days: 1

  publish-node-universal:
    runs-on: ubuntu-latest
    needs: [preflight]
    if: needs.preflight.outputs.tag-match == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        id: setup
        uses: ./.github/actions/node-layer-setup
        with:
          node-version: 22
      - name: Publish universal layer
        id: publish
        env:
          AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BUCKET_NAME_PREFIX:     ${{ vars.BUCKET_NAME_PREFIX || 'nr-layers' }}
          PREFLIGHT_SKIP_REGIONS: ${{ needs.preflight.outputs.skipped-regions }}
        run: make publish-nodejs-universal-ci
      - name: Publish universal ECR image
        id: ecr
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REPO_NAME:         ${{ vars.ECR_REPO_NAME || 'x6n7b2o2' }}
        run: |
          cd nodejs
          ./publish-layers.sh build-publish-universal-ecr-image
      - name: Validate published layer
        id: validate
        if: steps.publish.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          LAYER_VERSION=$(aws lambda list-layer-versions \
            --layer-name NewRelicNodeJS \
            --region us-east-1 \
            --query 'LayerVersions[0].Version' \
            --output text) || true
          LAYER_VERSION="${LAYER_VERSION//[[:space:]]/}"
          if [[ -z "$LAYER_VERSION" || "$LAYER_VERSION" == "None" ]]; then
            echo "::error::Layer validation failed: NewRelicNodeJS not found in us-east-1 after publish"
            exit 1
          fi
          echo "Layer validated: NewRelicNodeJS v${LAYER_VERSION}"
          echo "published-version=${LAYER_VERSION}" >> $GITHUB_OUTPUT
      - name: Upload Unit Test Coverage
        uses: codecov/codecov-action@v5.3.1
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/coverage/unit/lcov.info
          fail_ci_if_error: true
          flags: unit-tests
      - name: Write job result to artifact
        if: always()
        env:
          JOB_STATUS:        ${{ job.status }}
          PUBLISH_OUTCOME:   ${{ steps.publish.outcome }}
          ECR_OUTCOME:       ${{ steps.ecr.outcome }}
          VALIDATE_OUTCOME:  ${{ steps.validate.outcome }}
          PUBLISHED_VERSION: ${{ steps.validate.outputs.published-version }}
        run: |
          mkdir -p /tmp/layer-results

          if [[ "$PUBLISH_OUTCOME" == "failure" ]]; then
            REASON="Layer publish to AWS failed"
          elif [[ "$ECR_OUTCOME" == "failure" ]]; then
            REASON="ECR image push failed"
          elif [[ "$VALIDATE_OUTCOME" == "failure" ]]; then
            REASON="Post-publish validation failed — layer not accessible in AWS"
          elif [[ "$JOB_STATUS" != "success" ]]; then
            REASON="Setup or tests failed"
          fi

          SKIPPED_REGIONS=""
          [[ -f /tmp/layer-results/skipped-regions.txt ]] && SKIPPED_REGIONS=$(cat /tmp/layer-results/skipped-regions.txt | tr '\n' ',')

          {
            echo "label=Node.js Universal"
            echo "status=${JOB_STATUS}"
            echo "version=${PUBLISHED_VERSION}"
            echo "reason=${REASON:-}"
            echo "skipped-regions=${SKIPPED_REGIONS}"
          } > /tmp/layer-results/node-universal.txt
      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layer-result-node-universal
          path: /tmp/layer-results/node-universal.txt
          retention-days: 1

  notify:
    runs-on: ubuntu-latest
    needs: [publish-node, publish-node-universal]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Send aggregated Slack notification
        uses: ./.github/actions/slack-notify-aggregated
        with:
          artifact-pattern:  layer-result-node-*
          language-name:     Node.js
          slack-webhook-url: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

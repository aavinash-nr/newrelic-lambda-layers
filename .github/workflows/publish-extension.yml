name: Publish Extension Layer

on:
  push:
    tags:
      - v**_extension

jobs:
  publish-extension:
    uses: ./.github/workflows/_publish-single-layer.yml
    with:
      tag-pattern:    '^refs/tags/v[0-9]+(\.[0-9]+)*_extension$'
      install-awscli: true
      publish-dir:    extension
      publish-script: ./publish-layer.sh
      artifact-key:   extension
      artifact-label: Extension
      language-name:  Extension
    secrets:
      AWS_ACCESS_KEY_ID:           ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      LAYER_RELEASE_SLACK_WEBHOOK: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

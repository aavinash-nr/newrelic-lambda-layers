name: Publish Dotnet Layers

on:
  push:
    tags:
      - v**_dotnet

jobs:
  publish-dotnet:
    uses: ./.github/workflows/_publish-single-layer.yml
    with:
      tag-pattern:    '^refs/tags/v[0-9]+(\.[0-9]+)*_dotnet$'
      install-awscli: false
      publish-dir:    dotnet
      publish-script: ./publish-layers.sh
      artifact-key:   dotnet
      artifact-label: .NET
      language-name:  .NET
    secrets:
      AWS_ACCESS_KEY_ID:           ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:       ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      LAYER_RELEASE_SLACK_WEBHOOK: ${{ secrets.LAYER_RELEASE_SLACK_WEBHOOK }}

name: 'Slack Release Notification'
description: 'Send a Slack notification with the result of a layer release'

inputs:
  layer-name:
    description: 'Name of the layer (e.g., Node.js, Python, Ruby)'
    required: true
  layer-version:
    description: 'Version of the layer (e.g., 20, 3.12). Leave empty for non-versioned layers.'
    required: false
    default: ''
  job-status:
    description: 'Status of the job: success, failure, or cancelled'
    required: true
  slack-webhook-url:
    description: 'Slack Incoming Webhook URL'
    required: true
  failure-details:
    description: 'Human-readable reason for failure (e.g., which step failed and why)'
    required: false
    default: ''
  published-version:
    description: 'The AWS layer version number that was published (e.g., 42)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Send Slack notification
      shell: bash
      env:
        SLACK_WEBHOOK:      ${{ inputs.slack-webhook-url }}
        LAYER_NAME:         ${{ inputs.layer-name }}
        LAYER_VERSION:      ${{ inputs.layer-version }}
        JOB_STATUS:         ${{ inputs.job-status }}
        FAILURE_DETAILS:    ${{ inputs.failure-details }}
        PUBLISHED_VERSION:  ${{ inputs.published-version }}
        GH_REF_NAME:        ${{ github.ref_name }}
        GH_ACTOR:           ${{ github.actor }}
        RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [[ "$JOB_STATUS" == "success" ]]; then
          HEADER="✅ Layer Release Succeeded"
        else
          HEADER="❌ Layer Release Failed"
        fi

        DISPLAY_NAME="$LAYER_NAME"
        [[ -n "$LAYER_VERSION" ]] && DISPLAY_NAME="$LAYER_NAME $LAYER_VERSION"

        # Build blocks array safely with jq — no string interpolation into JSON
        BLOCKS=$(jq -n \
          --arg header "$HEADER" \
          --arg display_name "$DISPLAY_NAME" \
          --arg ref_name "$GH_REF_NAME" \
          --arg status "$JOB_STATUS" \
          --arg actor "$GH_ACTOR" \
          --arg run_url "$RUN_URL" \
          --arg failure_details "$FAILURE_DETAILS" \
          --arg published_version "$PUBLISHED_VERSION" \
          '
          [
            {
              type: "header",
              text: { type: "plain_text", text: $header, emoji: true }
            },
            {
              type: "section",
              fields: [
                { type: "mrkdwn", text: ("*Layer:*\n" + $display_name) },
                { type: "mrkdwn", text: ("*Tag:*\n`" + $ref_name + "`") },
                { type: "mrkdwn", text: ("*Status:*\n" + $status) },
                { type: "mrkdwn", text: ("*Triggered by:*\n" + $actor) }
              ]
            }
          ]
          + (if $status == "success" and $published_version != "" then [{
              type: "section",
              text: { type: "mrkdwn", text: ("*Published Layer Version:* `" + $published_version + "`") }
            }] else [] end)
          + (if $status != "success" and $failure_details != "" then [{
              type: "section",
              text: { type: "mrkdwn", text: ("*Failure Details:*\n" + $failure_details) }
            }] else [] end)
          + [{
              type: "actions",
              elements: [{
                type: "button",
                text: { type: "plain_text", text: "View Workflow Run" },
                url: $run_url
              }]
            }]
          ')

        curl -sf -X POST "$SLACK_WEBHOOK" \
          -H 'Content-Type: application/json' \
          -d "{\"blocks\": $BLOCKS}"

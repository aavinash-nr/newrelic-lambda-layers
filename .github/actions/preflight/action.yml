name: 'Pre-flight Check'
description: 'Validate tag format, AWS credentials, S3 access, and Lambda API per region'

inputs:
  tag-pattern:
    description: 'Bash regex to validate the git tag (e.g. ^refs/tags/v[0-9]+(\\.[0-9]+)*_nodejs$)'
    required: true
  artifact-key:
    description: 'Short key used to name the failure artifact (e.g. node, python, java)'
    required: true
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  bucket-name-prefix:
    description: 'S3 bucket name prefix (default: nr-layers)'
    required: false
    default: 'nr-layers'

outputs:
  tag-match:
    description: 'true if the git tag matches the expected pattern'
    value: ${{ steps.check-tag.outputs.match }}
  skipped-regions:
    description: 'Comma-separated list of regions that failed pre-flight'
    value: ${{ steps.run.outputs.skipped-regions }}

runs:
  using: composite
  steps:
    - name: Check Tag
      id: check-tag
      shell: bash
      env:
        GIT_REF:     ${{ github.event.ref }}
        TAG_PATTERN: ${{ inputs.tag-pattern }}
      run: |
        if [[ "$GIT_REF" =~ $TAG_PATTERN ]]; then
          echo "match=true" >> $GITHUB_OUTPUT
        fi

    - name: Prepare results directory
      shell: bash
      run: mkdir -p /tmp/layer-results

    - name: Pre-flight check (credentials + S3 + Lambda API)
      id: run
      if: steps.check-tag.outputs.match == 'true'
      shell: bash
      env:
        AWS_ACCESS_KEY_ID:     ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        BUCKET_NAME_PREFIX:    ${{ inputs.bucket-name-prefix }}
      run: |
        source libBuild.sh
        preflight_check
        echo "skipped-regions=$(IFS=,; echo "${PREFLIGHT_SKIP[*]}")" >> $GITHUB_OUTPUT

    - name: Upload preflight failure artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: layer-result-${{ inputs.artifact-key }}-preflight
        path: /tmp/layer-results/preflight-failure.txt
        retention-days: 1
